services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: leadz
      POSTGRES_USER: leadz
      POSTGRES_PASSWORD: leadz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadz -d leadz"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    volumes:
      - uploads:/app/public/uploads
    environment:
      APP_ENV: dev
      APP_SECRET: change_this_to_a_random_32_char_string
      DATABASE_URL: postgresql://leadz:leadz@postgres:5432/leadz?serverVersion=16&charset=utf8
      JWT_SECRET_KEY: /app/config/jwt/private.pem
      JWT_PUBLIC_KEY: /app/config/jwt/public.pem
      JWT_PASSPHRASE: leadz_jwt_passphrase
      CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:
