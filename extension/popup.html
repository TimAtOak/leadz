<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leadz</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: #fff; color: #111; width: 360px; min-height: 200px; }
      .screen { padding: 16px; }
      h1 { font-size: 18px; font-weight: 700; color: #0284c7; margin-bottom: 4px; }
      .subtitle { font-size: 12px; color: #6b7280; margin-bottom: 16px; }
      label { display: block; font-size: 12px; font-weight: 500; color: #374151; margin-bottom: 4px; }
      input { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; outline: none; margin-bottom: 10px; }
      input:focus { border-color: #0ea5e9; box-shadow: 0 0 0 2px rgba(14,165,233,0.15); }
      button { width: 100%; padding: 9px; background: #0284c7; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
      button:hover { background: #0369a1; }
      button:disabled { opacity: 0.5; cursor: default; }
      .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 6px; padding: 8px 10px; font-size: 12px; margin-bottom: 10px; }
      .success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; border-radius: 6px; padding: 8px 10px; font-size: 12px; margin-bottom: 10px; }
      .info { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 6px; padding: 10px; margin-bottom: 10px; }
      .info .domain { font-size: 15px; font-weight: 600; color: #0369a1; }
      .info .url { font-size: 11px; color: #6b7280; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }
      .chip-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
      .chip { background: #e0f2fe; color: #0369a1; padding: 2px 6px; border-radius: 99px; font-size: 11px; }
      .meta-row { font-size: 12px; color: #6b7280; margin-top: 6px; }
      .meta-label { font-weight: 500; color: #374151; }
      .logout { display: block; text-align: center; font-size: 11px; color: #9ca3af; margin-top: 10px; cursor: pointer; text-decoration: underline; background: none; border: none; width: auto; padding: 0; }
      .logout:hover { color: #6b7280; background: none; }
      a { color: #0284c7; text-decoration: none; font-size: 12px; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/popup/main.tsx"></script>
  </body>
</html>
